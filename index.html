<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stationary Mart</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
        }
        h1 {
            margin: 0;
        }
        main {
            padding: 20px;
        }
        .stationary-pic {
            width: 100%;
            max-width: 600px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        footer {
            background-color: #333;
            color: white;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Cloud Computing 3 - Stationary Mart</h1>
    </header>
    <main>
        <img src="stationary.jpg" alt="Stationary" class="stationary-pic">
        <h2>Welcome to Our Stationary Shop!</h2>
        <p>Explore our wide range of high-quality stationary products.</p>
    </main>
    <footer>
        <p>Deployed by: Abdul Samad</p>
    </footer>
</body>
</html>
